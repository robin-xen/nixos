# =============================================
# General Settings
# =============================================

# Start window/pane indexing at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Make tmux respect true color + modern terminals
set -g default-terminal "tmux-256color"

# Enable mouse support
set -g mouse on

# Use vi keys in copy mode
setw -g mode-keys vi

# Increase scrollback buffer size
set -g history-limit 100000

# Faster responsiveness (remove delay on ESC key)
set -s escape-time 0

# Clipboard and passthrough features
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features '*:clipboard'

# =============================================
# Key Bindings
# =============================================
unbind C-b 
set-option -g prefix C-s 
bind C-s send-prefix


# Vim-style pane movement (Ctrl + h/j/k/l)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with Alt + h/j/k/l (increments of 3)
bind -n M-h resize-pane -L 3
bind -n M-j resize-pane -D 3
bind -n M-k resize-pane -U 3
bind -n M-l resize-pane -R 3

# =============================================
# Status Bar Appearance
# =============================================
# Split panes using | and - (more intuitive)
bind | split-window -h
bind - split-window -v


set -g status on
set -g status-interval 5

# Catppuccin-esque Dark Theme
set -g status-style bg="#1e1e2e",fg="#cdd6f4"

set -g status-left-length 40
set -g status-right-length 100

set -g status-left "  #[bold]#S  "
set -g status-right "  %Y-%m-%d %H:%M  "
